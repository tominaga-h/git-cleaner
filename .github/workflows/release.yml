name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # 例: v1.0.0 のようなタグがPushされた時のみ発火

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --draft --generate-notes

  build-release:
    name: Build & Upload Release Asset
    needs: ["create-release"]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # Apple (Apple Silicon) — Intel Mac でも Rosetta 2 で動作する
          - target: aarch64-apple-darwin
            os: macos-latest
          # Windows (x86_64)
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ターゲットのツールチェインを明示的に追加
      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # 非常に便利なRustバイナリアップロード用Action
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: git-cleaner
          target: ${{ matrix.target }}
          tar: unix # Unix系は tar.gz 形式で圧縮
          zip: windows # Windows は zip 形式で圧縮
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
